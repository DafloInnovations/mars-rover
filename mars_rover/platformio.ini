[platformio]
src_dir = ../firmware

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DMQTT_MAX_PACKET_SIZE=512
lib_deps =
    miguelbalboa/MFRC522@^1.4.12
    madhephaestus/ESP32Servo@^3.0.7
    knolleary/PubSubClient@^2.8
